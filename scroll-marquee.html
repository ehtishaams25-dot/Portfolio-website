<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Curved Marquee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #030303;
            --bg-light: #F4EFE6;
            --brand-green: #244432;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            height: 350vh;
            /* Huge height to allow plenty of scrolling */
            font-family: 'Instrument Serif', serif;
            overflow-x: hidden;
        }

        /* Starry background for the top half */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image:
                radial-gradient(1px 1px at 10% 20%, #f2ead0, rgba(0, 0, 0, 0)),
                radial-gradient(1.5px 1.5px at 30% 40%, #ffffff, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 50% 10%, #e8d7a5, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 70% 60%, #ffffff, rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 90% 30%, #f2ead0, rgba(0, 0, 0, 0)),
                radial-gradient(1.5px 1.5px at 20% 80%, #ffffff, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 400px 400px;
        }

        .scroll-instruction {
            position: fixed;
            top: 15%;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 2.5rem;
            opacity: 0.5;
            animation: pulse 2s infinite;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3;
                transform: translateY(0);
            }

            50% {
                opacity: 0.8;
                transform: translateY(15px);
            }
        }

        .marquee-section {
            position: sticky;
            top: 35vh;
            /* Locks it in the center of the viewport while you scroll the long body */
            width: 100%;
            height: 400px;
            overflow: hidden;
        }

        svg {
            width: 100%;
            height: 100%;
            min-width: 1200px;
            /* Prevents the curve from squishing on narrow screens */
            display: block;
        }
    </style>
</head>

<body>
    <div class="stars"></div>
    <!-- <div class="scroll-instruction">Scroll Down ↓</div> -->

    <div class="marquee-section">
        <svg viewBox="0 0 1600 400" preserveAspectRatio="xMidYMid slice">
            <!-- 1. Solid Off-white background block covering the area below the curve -->
            <path d="M -100 200 C 500 0, 1100 400, 1700 200 L 1700 500 L -100 500 Z" fill="var(--bg-light)" />

            <!-- 2. The solid dark green curved band -->
            <path d="M -100 200 C 500 0, 1100 400, 1700 200" fill="none" stroke="var(--brand-green)"
                stroke-width="140" />

            <!-- 3. Top dashed border (shifted up by 70px to match the edge of the 140px stroke) -->
            <path d="M -100 130 C 500 -70, 1100 330, 1700 130" fill="none" stroke="var(--bg-light)" stroke-width="2"
                stroke-dasharray="15,15" />

            <!-- 4. Bottom dashed border (shifted down by 70px) -->
            <path d="M -100 270 C 500 70, 1100 470, 1700 270" fill="none" stroke="var(--bg-light)" stroke-width="2"
                stroke-dasharray="15,15" />

            <!-- 5. Invisible path exactly in the center for the text to follow -->
            <path id="text-path-line" d="M -100 200 C 500 0, 1100 400, 1700 200" fill="none" />

            <!-- 6. The Marquee Text -->
            <text font-family="'Instrument Serif', serif" font-size="85" fill="var(--bg-light)"
                dominant-baseline="central" letter-spacing="1">
                <textPath href="#text-path-line" startOffset="0%" id="marquee-text">
                    <!-- Text injected via JS -->
                </textPath>
            </text>
        </svg>
    </div>

    <script>
        const textPath = document.getElementById('marquee-text');

        // The phrase with non-breaking spaces for gaps
        const phrase = "• Mohammed Ehtishaam Shaikh • Video Editor  Motion Graphics Designer  ";

        // Repeat it many times so we never run out of text while scrolling
        textPath.textContent = phrase.repeat(50);

        // Start deep in the string so we can scroll upwards (backwards) without hitting the start
        let baseOffset = -2000;

        window.addEventListener('scroll', () => {
            const scrollY = window.scrollY;

            // Adjust this speed value to make it move faster or slower relative to your scroll speed
            const speed = 2;

            const currentOffset = baseOffset - (scrollY * speed);
            textPath.setAttribute('startOffset', currentOffset + 'px');
        });

        // Set initial position
        textPath.setAttribute('startOffset', baseOffset + 'px');
    </script>
</body>

</html>
